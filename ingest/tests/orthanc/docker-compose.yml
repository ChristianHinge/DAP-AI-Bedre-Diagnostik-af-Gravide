services:

  ## Orthanc mellemmand (imellem UL-skanner og DBX pixels)
  orthanc-middleman:
    build: .
    ports:
      - "8042:8042"   
      - "4242:4242"   
      - "4243:4243"
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      - ../../orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ../../orthanc/plugin_entrypoint.py:/etc/orthanc/plugin_entrypoint.py:ro
      - ../../orthanc/plugin_mpps.py:/etc/orthanc/plugin_mpps.py:ro
      - ../../orthanc/plugin_nightly_cleanup.py:/etc/orthanc/plugin_nightly_cleanup.py:ro
    env_file:
      - .env

  ## Endpoint (simulering af dbx pixels)
  orthanc-endpoint:
    image: orthancteam/orthanc:latest
    ports:
      - "8052:8042"   
      - "4252:4242"   
volumes:
  orthanc-storage:
